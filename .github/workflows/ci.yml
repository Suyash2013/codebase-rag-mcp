name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff>=0.8.0
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]" mypy>=1.13.0
      - run: mypy mcp_server config

  security:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install pip-audit
      - run: pip install -e .
      - run: pip-audit

  claude-review:
    name: Claude Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for correctness, security, type safety, and testing.
            Focus on substance, not style (ruff handles that).

            Classify every issue found using this priority framework:
            - BLOCKER: Security vulnerabilities (injection, auth bypass, credential/data exposure)
            - P0: Critical bugs that crash, corrupt data, or break core functionality
            - P1: Important bugs, significant security concerns, major test coverage gaps
            - P2: Non-critical bugs, code quality issues that could cause future problems
            - P3: Minor improvements, edge cases, non-critical suggestions
            - P4: Style preferences, documentation, nice-to-haves

            Format each finding as: [PRIORITY] path/to/file.py:line — description

            After your review, write the result:
            - If you found any BLOCKER or P0 issues: run `echo "BLOCKING" > "$GITHUB_WORKSPACE/.claude_review_result"`
            - If no BLOCKER/P0 issues: run `echo "PASSING" > "$GITHUB_WORKSPACE/.claude_review_result"`
      - name: Enforce blocking review
        run: |
          if [ -f "$GITHUB_WORKSPACE/.claude_review_result" ] && grep -q "^BLOCKING$" "$GITHUB_WORKSPACE/.claude_review_result"; then
            echo "::error::Claude Code Review found BLOCKER or P0 issues. These must be resolved before merging."
            exit 1
          fi

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [ lint, typecheck, claude-review ]
    if: |
      !cancelled() &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      (needs.claude-review.result == 'success' || needs.claude-review.result == 'skipped' || needs.claude-review.result == 'failure')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: pytest --cov --cov-fail-under=65

  build:
    name: Build package
    needs: [test]
    if: ${{ !cancelled() && needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install hatch
      - run: hatch build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build, security]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.security.result == 'success' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
