name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          review_prompt: |
            Review this PR for:
            - Correctness: logic errors, edge cases, off-by-one errors
            - Security: injection, path traversal, unsafe deserialization, secret exposure
            - Type safety: missing type annotations on public APIs, Any abuse, incorrect types
            - Testing: untested code paths, missing edge case tests, brittle assertions
            - Performance: unnecessary allocations, O(n²) where O(n) suffices

            Do NOT comment on style or formatting — ruff handles that.
            Be specific and actionable. Reference line numbers. Suggest fixes where possible.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
