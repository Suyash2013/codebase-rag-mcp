[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "codebase-rag-mcp"
version = "1.0.0"
description = "Claude Code MCP plugin for semantic codebase search — zero-config, token-efficient"
requires-python = ">=3.10"
dependencies = [
    "mcp[cli]>=1.0.0",
    "qdrant-client>=1.9.0",
    "requests>=2.31.0",
    "pydantic-settings>=2.0",
    "pathspec>=0.12.0",
    "onnxruntime>=1.17.0",
    "tokenizers>=0.15.0",
    "huggingface-hub>=0.20.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov", "responses"]

[project.scripts]
codebase-rag = "mcp_server.cli:main"
codebase-rag-setup = "mcp_server.cli:setup"

[tool.hatch.build.targets.wheel]
packages = ["mcp_server", "config"]
