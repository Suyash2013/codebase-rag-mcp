[project]
name = "codebase-rag-mcp"
version = "0.2.0"
description = "Claude Code MCP plugin for semantic codebase search via Qdrant + Ollama"
requires-python = ">=3.10"
dependencies = [
    "mcp[cli]>=1.0.0",
    "qdrant-client>=1.9.0",
    "requests>=2.31.0",
    "pydantic-settings>=2.0",
    "pathspec>=0.12.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov", "responses"]

[project.scripts]
codebase-rag-mcp = "mcp_server.server:mcp.run"
